services:
  db:
    image: mariadb:11
    container_name: project-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-projectdb}
      MYSQL_USER: ${DB_USER:-projectuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-projectpass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: project-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-projectuser}
      PMA_PASSWORD: ${DB_PASSWORD:-projectpass}
    ports:
      - "8080:80"

volumes:
  db_data:
