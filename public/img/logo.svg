<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" rx="16" fill="url(#bg)"/>
  <!-- Title -->
  <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffd500">FLAPPY BIRD</text>
  <!-- Game box preview -->
  <rect x="70" y="65" width="160" height="100" rx="8" fill="#70c5ce" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Mini bird -->
  <ellipse cx="110" cy="105" rx="10" ry="8" fill="#f4c542"/>
  <circle cx="115" cy="102" r="3" fill="white"/>
  <circle cx="116" cy="102" r="1.5" fill="#1a1a2e"/>
  <polygon points="120,104 128,106 120,109" fill="#e85d3a"/>
  <!-- Mini pipes -->
  <rect x="160" y="65" width="20" height="30" fill="#73bf2e" stroke="#4a8a1a" stroke-width="1" rx="2"/>
  <rect x="160" y="115" width="20" height="50" fill="#73bf2e" stroke="#4a8a1a" stroke-width="1" rx="2"/>
  <!-- Ground -->
  <rect x="70" y="155" width="160" height="10" fill="#ded895"/>
  <!-- Stars -->
  <text x="30" y="30" font-size="14" fill="#ffd500" opacity="0.6">★</text>
  <text x="260" y="40" font-size="10" fill="#ffd500" opacity="0.4">★</text>
  <text x="20" y="170" font-size="8" fill="#70c5ce" opacity="0.5">★</text>
</svg>
